<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOカレンダー</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>TODOカレンダー</h1>
            <p>タスクの重要度を簡易判定します</p>
            <button id="open-modal-btn">+ 新規タスク</button>
        </header>

        <main>
            <div class="calendar">
                <div class="calendar-header">
                    <button id="prev-month">&lt; 先月</button>
                    <h2 id="current-month-year">2026年 4月</h2>
                    <button id="next-month">来月 &gt;</button>
                </div>
                <div class="days-header">
                    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- カレンダーのマスがここに入ります -->
                </div>
            </div>

            <div class="task-list">
                <h2 id="selected-date-display">タスク一覧</h2>
                <div id="tasks-list">
                    <!-- タスクがここに入ります -->
                </div>
            </div>
        </main>
    </div>

    <!-- モーダル -->
    <div id="task-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>新しいタスクを追加</h2>
            <form id="task-form">
                <div>
                    <label>タイトル</label><br>
                    <input type="text" id="task-title" required>
                </div>
                <div>
                    <label>詳細</label><br>
                    <textarea id="task-desc"></textarea>
                </div>
                <div>
                    <label>日付</label><br>
                    <input type="date" id="task-date" required>
                </div>
                <button type="submit" id="submit-task-btn">追加</button>
                <button type="button" id="close-modal-btn">キャンセル</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
